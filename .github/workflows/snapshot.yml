name: Snapshot

on:
  workflow_dispatch:
  push:
    branches:
      - 'em-*'

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  version:
    name: Version
    runs-on: ubuntu-slim
    outputs:
      tag_abbrev: ${{ steps.version.outputs.tag_abbrev }}
      tag_offset: ${{ steps.version.outputs.tag_offset }}
      sha_short: ${{ steps.version.outputs.sha_short }}
      full_desc: ${{ steps.version.outputs.full_desc }}
      branch: ${{ steps.version.outputs.branch }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Version
      id: version
      shell: bash
      run: |
        tag_abbrev=$(git describe --tags --exclude '*nightly*' --abbrev=0)
        echo "tag_abbrev=$tag_abbrev" >> $GITHUB_OUTPUT
        echo "tag_offset=$(git rev-list $tag_abbrev..HEAD --count)" >> $GITHUB_OUTPUT
        echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "full_desc=$(git describe --long --tags --exclude '*nightly*')" >> $GITHUB_OUTPUT
        echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT

  build:
    name: Build
    needs: version
    strategy:
      matrix:
        include:
          - name: proton-${{ needs.version.outputs.full_desc }}-x86_64
            cflags: -O2 -march=nocona -mtune=core-avx2
            rustflags: -Copt-level=3 -Ctarget-cpu=nocona

          - name: proton-${{ needs.version.outputs.full_desc }}-arm64
            configure: >-
              --target-arch=arm64
            runner: 'ubuntu-24.04-arm'
    uses: ./.github/workflows/_job_build.yml
    with:
      name: ${{ matrix.name }}
      cflags: ${{ matrix.cflags }}
      rustflags: ${{ matrix.rustflags }}
      configure: --enable-ccache ${{ matrix.configure }}
      runner: ${{ matrix.runner != '' && matrix.runner || 'ubuntu-24.04' }}
      continue: true

  test:
    name: Test
    needs: [version, build]
    strategy:
      matrix:
        include:
          - name: proton-${{ needs.version.outputs.full_desc }}-x86_64
          - name: proton-${{ needs.version.outputs.full_desc }}-arm64
            runner: 'ubuntu-24.04-arm'
    uses: ./.github/workflows/_job_test.yml
    with:
      name: ${{ matrix.name }}
      runner: ${{ matrix.runner != '' && matrix.runner || 'ubuntu-24.04' }}
      continue: false

  nightly:
    name: Nightly
    needs: [version, build, test]
    runs-on: ubuntu-slim
    outputs:
      title: ${{ steps.title.outputs.title }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true
    - name: Title
      id: title
      shell: bash
      run: |
        git fetch origin +refs/tags/*:refs/tags/*
        python -c "v='${{ needs.version.outputs.full_desc }}'.split('-');print('title='+'-'.join([v[0],v[1],'nightly']))" >> "$GITHUB_OUTPUT"
    - name: Delete
      id: delete
      shell: bash
      run: >-
        gh
        release delete
        ${{ steps.title.outputs.title }}
        --cleanup-tag
        --yes
        || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Create
      id: create
      shell: bash
      run: >-
        gh
        release create
        ${{ steps.title.outputs.title }}
        --prerelease
        --latest=false
        --title "Development ${{ steps.title.outputs.title }}"
        --notes "Version: ${{ needs.version.outputs.full_desc }}"
        --notes-file ./NIGHTLY_NOTES.md
        --generate-notes
        --notes-start-tag ${{ needs.version.outputs.tag_abbrev }}
        --target ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload:
    name: Upload
    needs: [version, nightly]
    strategy:
      matrix:
        include:
          - name: proton-${{ needs.version.outputs.full_desc }}-x86_64
          - name: proton-${{ needs.version.outputs.full_desc }}-arm64
    uses: ./.github/workflows/_job_upload.yml
    with:
      version: ${{ needs.nightly.outputs.title }}
      name: ${{ matrix.name }}
